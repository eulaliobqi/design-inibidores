project:
  name: "design-inibidores-tripsina-lepidoptera"
  description: "Design racional de inibidores peptídicos de tripsina de Lepidoptera"

data:
  receptor_pdbs:
    - "data-trypsin/ACR157-A.pdb"    # chain A, resíduos 1-231 (original 24-254)
    - "data-trypsin/QCL936-A.pdb"    # chain A, resíduos 1-247 (original 52-298)
    - "data-trypsin/XP273-A.pdb"     # chain A, resíduos 1-240 (original 40-279)
    - "data-trypsin/XP352-A.pdb"     # chain A, resíduos 1-247 (original 68-314)
  outputs_dir: "outputs"

structure:
  pocket_detection: "fpocket"        # fpocket | manual
  min_druggability: 0.5
  # Tríade catalítica de serino-proteases (busca por tipo + proximidade espacial)
  catalytic_residues: ["HIS", "ASP", "SER"]
  # Resíduos S1-pocket determinantes de especificidade para tripsina
  s1_specificity_residue: "ASP"      # Asp189 em numeração bovina
  s1_pocket_depth_cutoff: 8.0        # Å

rfdiffusion:
  num_designs: 50
  noise_scale_ca: 0.2
  noise_scale_frame: 0.1
  contig_lengths: [5, 7, 10, 12, 15]  # Fase 4: comprimentos reais (20 removido — rodada anterior fixou em 20aa)
  hotspot_radius: 6.0               # Å em torno do sítio S1
  # Caminhos possíveis (detectados automaticamente)
  install_paths:
    - "~/RFdiffusion"
    - "$HOME/RFdiffusion"
    - "/opt/RFdiffusion"
    - "$HOME/tools/RFdiffusion"
    - "/usr/local/RFdiffusion"

proteinmpnn:
  num_seq_per_target: 500            # Dataset ML/DL — máxima cobertura do espaço
  sampling_temp: 0.1
  backbone_noise: 0.05
  # batch_size=1 (default do ProteinMPNN) subutiliza GPU real (RTX 5070 Ti 16GB —
  # observado 2026-07-18: só 540MB/38% util. a batch_size=1). 25 acelera bastante
  # com margem segura de VRAM para peptídeos curtos (5-20aa) + receptor ~231aa.
  batch_size: 25
  fixed_positions: {}
  # Cys banida (revertido 2026-07-18): tentativa de dissulfeto SFTI-1-like (Fase 5+)
  # exigiria reconstrução de estrutura in-place na conformação MD real, não apenas
  # liberar Cys no MPNN + mutação ingênua via PeptideBuilder — ver
  # memória literatura_inibidor_ideal_tripsina.md, decisão do usuário de não seguir
  # essa linha por ora (esforço vs. retorno não compensava).
  omit_aas: "CX"
  bias_aa: {}
  install_paths:
    - "~/ProteinMPNN"
    - "$HOME/ProteinMPNN"
    - "/opt/ProteinMPNN"
    - "$HOME/tools/ProteinMPNN"

ml_dataset:
  export_csv: true
  output_file: "outputs/dataset/ml_training_dataset.csv"
  top_for_docking: 1000              # Fase 2: expandido de 200→1000 para labels ML suficientes
  features:
    - length
    - mw_da
    - net_charge
    - isoelectric_point
    - hydrophobicity_kd
    - boman_index
    - instability_index
    - aliphatic_index
    - frac_aromatic
    - frac_hydrophobic
    - frac_charged
    - n_arg_lys
    - has_aromatic_cterminal

rosetta:
  flexpepdock_nstruct: 10
  fastrelax: true
  score_function: "ref2015"
  install_paths:
    - "/opt/rosetta"
    - "$HOME/rosetta"
    - "$HOME/tools/rosetta"
    - "/usr/local/rosetta"

docking:
  tool: "vina"                      # vina | gnina | smina
  exhaustiveness: 8
  num_modes: 9
  # Coordenadas calculadas automaticamente pela StructureAgent
  # (sobrescritas após análise estrutural)
  center_x: null
  center_y: null
  center_z: null
  size_x: 40.0    # base; _adaptive_grid_size() expande automaticamente por comprimento
  size_y: 40.0
  size_z: 40.0

md:
  tool: "gromacs"
  simulation_ns: 10
  temperature: 300                  # K
  forcefield: "amber99sb-ildn"
  water_model: "tip3p"
  # Fase 5+ (2026-07-17): intestino de Lepidoptera é fortemente alcalino (pH 8-11;
  # Manduca sexta trypsin ótimo pH 10,5, atividade máx. registrada pH 11,5 em outra espécie).
  # MD padrão assume protonação ~neutra — pdb2pqr/propka corrige estado de protonação real
  # de His/Lys/Asp/Glu antes do pdb2gmx (amber99sb-ildn.ff já tem HID/HIE/HIP/LYN/ASH/GLH/CYX).
  gut_ph: 10.0
  use_propka: true
  # Para produção: aumentar para 100+ ns

optimization:
  top_k: 50                         # Fase 2: Rosetta refina top-50 dockados | para --step optimize usar 5
  max_iterations: 2                 # 2 rodadas de mutação (reduzido de 3)
  mutation_rate: 0.3
  positions_to_vary: [2, 3, 4, 5]  # P2-P5 (P1 fixo)
  require_no_kr_internal: true      # Fase 5a (2026-07-17): filtra candidatos com K/R internos (resistência proteolítica) — 0/20 candidatos das Fases 3-4 eram resistentes
  prefer_md_stable_parents: true    # preferir candidatos MD estáveis como parentais

ranking:
  weights:
    # Validado Fases 3+4: MD é filtro duro (instável = ×0.5 penalidade), não só peso
    vina_affinity: 0.45             # kcal/mol (menor = melhor) — energia física real
    rosetta_I_sc: 0.20             # interface score (menor = melhor)
    hbond_count: 0.15              # contatos H-bond (maior = melhor)
    md_rmsd: 0.15                  # RMSD MD (menor = melhor) — aumentado: lição Fases 3+4
    hydrophobicity: 0.05           # complementaridade hidrofóbica
  top_candidates: 20

report:
  format: ["markdown", "html"]
  top_n: 10

# ── Análise de especificidade (R4 — não afetar não-alvos) ──────────────────
specificity:
  selectivity_threshold: 2.0          # kcal/mol: SI mínimo para aprovação
  top_n_candidates: 20                # candidatos top-N por Vina a avaliar
  # Proteases não-alvo — PDBs baixados automaticamente
  nontargets:
    human_trypsin:
      pdb_id:      "1TRN"             # tripsina bovina (82% identidade com humana)
      description: "Tripsina humana — segurança alimentar/toxicológica"
    apis_mellifera:
      uniprot_id:  "A0A7M7MMI1"       # CORRIGIDO: Q9GYL5 dava 404; A0A7M7MMI1 = 247aa, AlphaFold v6 confirmado
      description: "Tripsina de Apis mellifera — proteção de polinizadores"

# ── Análise de resistência proteolítica (R5 — sobreviver ao trato intestinal)
cleavage:
  # Proteases do gut de Lepidoptera analisadas (priority 1+2 = high+medium)
  max_internal_trypsin_sites: 0       # flag candidatos com P1-internos
  susceptibility_threshold: 0.4      # score ≤ 0.4 = considerado resistente
  # Exporta resultados em:
  output_file: "outputs/cleavage_analysis.json"
