name: protein_design_env
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10
  - pip

  # Ciência e análise
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - biopython>=1.81
  - rdkit>=2023.3

  # Visualização
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.15

  # Relatórios e terminal
  - jinja2>=3.1
  - pyyaml>=6.0
  - tqdm>=4.65
  - rich>=13.0
  - markdown>=3.4

  # GROMACS serial (sem MPI — garante 'gmx', não 'gmx_mpi')
  - "gromacs=*=*serial*"

  # Detecção de bolsos de ligação
  - fpocket

  # AutoDock Vina
  - vina

  # Análise de trajetórias (via pip — evita conflito de solver)
  # mdtraj e mdanalysis instalados em setup.sh via pip

  - pip:
    - mdtraj>=1.9
    - mdanalysis>=2.7
    - biopandas>=0.4
    - pdbfixer>=1.9
    - PeptideBuilder>=1.1
    - plip>=2.3

    # PyRosetta — instalar separadamente (licença academia):
    # python -c "import pyrosetta_installer; pyrosetta_installer.install_pyrosetta()"

    # RFdiffusion — clonar e instalar:
    # git clone https://github.com/RosettaCommons/RFdiffusion $HOME/RFdiffusion
    # pip install -e $HOME/RFdiffusion/

    # ProteinMPNN — clonar (sem instalação extra):
    # git clone https://github.com/dauparas/ProteinMPNN $HOME/ProteinMPNN
